<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>加速度センサーモニター (XY平面)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .btn-group { margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 16px; margin-right: 10px; cursor: pointer;}
        button:disabled { cursor: not-allowed; opacity: 0.6; }
        #csvBtn { background-color: #4CAF50; color: white; border: none; border-radius: 4px;}
        #csvBtn:disabled { background-color: #cccccc; color: #666666;}
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
        th { background-color: #f2f2f2; text-align: center; }
    </style>
</head>
<body>

    <h1>XIAO ESP32C3 加速度モニター (XY平面)</h1>
    
    <div class="btn-group">
        <button id="startBtn">計測開始 (BLE接続)</button>
        <button id="stopBtn" disabled>計測終了</button>
        <button id="csvBtn" disabled>CSVダウンロード</button>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>経過時間 (s)</th>
                <th>Acc X (G)</th>
                <th>Acc Y (G)</th>
                <th>Vel X (m/s)</th>
                <th>Vel Y (m/s)</th>
                <th>Pos X (m)</th>
                <th>Pos Y (m)</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        let bleDevice;
        let bleCharacteristic;
        let isRecording = false;

        let startTime = 0;
        let lastTime = 0;
        
        // 速度 (m/s) と 距離/位置 (m)
        let velX = 0, velY = 0;
        let posX = 0, posY = 0;

        // CSV用データ保持配列
        let recordedData = [];

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const csvBtn = document.getElementById('csvBtn');
        const tbody = document.querySelector('#dataTable tbody');

        startBtn.addEventListener('click', async () => {
            try {
                if (!bleDevice) {
                    console.log('Bluetoothデバイスをリクエスト中...');
                    bleDevice = await navigator.bluetooth.requestDevice({
                        filters: [{ name: 'XIAO_ESP32C3_Accel' }],
                        optionalServices: [SERVICE_UUID]
                    });
                    
                    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                }

                console.log('GATTサーバーに接続中...');
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                await bleCharacteristic.startNotifications();
                bleCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);

                // 変数と表示の初期化
                startTime = performance.now();
                lastTime = startTime;
                velX = 0; velY = 0;
                posX = 0; posY = 0;
                recordedData = []; // 記録データをクリア
                tbody.innerHTML = ''; 
                isRecording = true;

                startBtn.disabled = true;
                stopBtn.disabled = false;
                csvBtn.disabled = true; // 計測中はダウンロード不可
                console.log('計測開始');
            } catch (error) {
                console.error('エラー:', error);
                alert('Bluetooth接続に失敗しました: ' + error);
            }
        });

        stopBtn.addEventListener('click', async () => {
            if (bleCharacteristic) {
                await bleCharacteristic.stopNotifications();
                bleCharacteristic.removeEventListener('characteristicvaluechanged', handleNotifications);
            }
            isRecording = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            csvBtn.disabled = false; // 計測終了でダウンロード可能に
            console.log('計測終了');
        });

        // CSV出力処理
        csvBtn.addEventListener('click', () => {
            if (recordedData.length === 0) {
                alert("エクスポートするデータがありません。");
                return;
            }

            // CSVのヘッダーを作成
            let csvContent = "経過時間(s),Acc_X(G),Acc_Y(G),Vel_X(m/s),Vel_Y(m/s),Pos_X(m),Pos_Y(m)\n";
            
            // 記録データをCSV形式の文字列に変換
            recordedData.forEach(row => {
                csvContent += row.join(",") + "\n";
            });

            // 文字列をBlob化してBOM(文字化け防止)を付与しダウンロード
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, csvContent], { type: "text/csv" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `AccelData_${new Date().getTime()}.csv`; // ファイル名にタイムスタンプを付与
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        function onDisconnected() {
            console.log('デバイスから切断されました');
            isRecording = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            csvBtn.disabled = false; // 切断時もダウンロード可能に
        }

        function handleNotifications(event) {
            if (!isRecording) return;

            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            const dataString = decoder.decode(value);
            // マイコンからはZ軸も送られてくるが、JS側でazは取得しつつも画面には使わない
            const [ax, ay, az] = dataString.split(',').map(Number);

            const currentTime = performance.now();
            const elapsedTime = (currentTime - startTime) / 1000;
            const dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            // --- 物理演算 ---
            // 1. 速度(m/s)の算出 (加速度の積分)
            velX += (ax * 9.80665) * dt;
            velY += (ay * 9.80665) * dt;

            // 2. 距離/位置(m)の算出 (速度の積分)
            posX += velX * dt;
            posY += velY * dt;

            // CSV保存用に配列へ追加
            recordedData.push([
                elapsedTime.toFixed(3),
                ax.toFixed(4),
                ay.toFixed(4),
                velX.toFixed(4),
                velY.toFixed(4),
                posX.toFixed(4),
                posY.toFixed(4)
            ]);

            // 表へ行を追加（最新データが一番上になるように）
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${elapsedTime.toFixed(2)}</td>
                <td>${ax.toFixed(3)}</td>
                <td>${ay.toFixed(3)}</td>
                <td>${velX.toFixed(3)}</td>
                <td>${velY.toFixed(3)}</td>
                <td>${posX.toFixed(3)}</td>
                <td>${posY.toFixed(3)}</td>
            `;
            tbody.insertBefore(tr, tbody.firstChild);
        }
    </script>
</body>
</html>

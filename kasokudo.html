<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>フライトモニター</title>
    <style>
        body { font-family: sans-serif; font-size: 14px; margin: 10px; }
        /* 計器の共通枠 (150x150の四角形) */
        .meter-box { display: inline-block; width: 150px; height: 150px; border: 1px solid #000; position: relative; overflow: hidden; margin: 0 10px 10px 0; vertical-align: top; background: #fff; }
        
        /* 姿勢指示器 (線のみ) */
        #roll-container { width: 100%; height: 100%; position: absolute; transform-origin: center; }
        /* 水平線となる下線 */
        #pitch-container { width: 100%; height: 400px; position: absolute; top: -250px; border-bottom: 1px solid #000; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 2px; background: red; transform: translate(-50%, -50%); }
        
        /* Gメーター (十字線と点) */
        .axis-v { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: #ccc; }
        .axis-h { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: #ccc; }
        #g-dot { width: 8px; height: 8px; background: green; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        button { margin: 0 5px 10px 0; padding: 5px 10px; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* テーブル */
        .table-wrap { max-height: 300px; overflow-y: auto; }
        table { border-collapse: collapse; width: 100%; font-size: 12px; }
        th, td { border: 1px solid #aaa; padding: 4px; text-align: right; }
        th { background: #eee; text-align: center; }
    </style>
</head>
<body>

    <button id="startBtn">計測開始</button>
    <button id="stopBtn" disabled>計測終了</button>
    <button id="csvBtn" disabled>CSV保存</button>
    <br>

    <div class="meter-box">
        <div id="roll-container"><div id="pitch-container"></div></div>
        <div class="crosshair"></div>
    </div>
    
    <div class="meter-box">
        <div class="axis-v"></div><div class="axis-h"></div>
        <div id="g-dot"></div>
    </div>

    <div class="table-wrap">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Time(s)</th><th>Roll(°)</th><th>Pitch(°)</th><th>AccX(G)</th><th>AccY(G)</th><th>VelX(m/s)</th><th>VelY(m/s)</th><th>PosX(m)</th><th>PosY(m)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        const MAX_G = 2.0; 

        let bleDevice, bleCharacteristic;
        let isRecording = false;
        let startTime = 0, lastTime = 0;
        let velX = 0, velY = 0, posX = 0, posY = 0;
        let recordedData = [];

        const startBtn = document.getElementById('startBtn'), stopBtn = document.getElementById('stopBtn'), csvBtn = document.getElementById('csvBtn');
        const tbody = document.querySelector('#dataTable tbody');
        const rollContainer = document.getElementById('roll-container'), pitchContainer = document.getElementById('pitch-container'), gDot = document.getElementById('g-dot');

        startBtn.addEventListener('click', async () => {
            try {
                if (!bleDevice) {
                    bleDevice = await navigator.bluetooth.requestDevice({ filters: [{ name: 'XIAO_ESP32C3_Accel' }], optionalServices: [SERVICE_UUID] });
                    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                }
                const server = await bleDevice.gatt.connect();
                bleCharacteristic = await (await server.getPrimaryService(SERVICE_UUID)).getCharacteristic(CHARACTERISTIC_UUID);
                await bleCharacteristic.startNotifications();
                bleCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);

                startTime = performance.now(); lastTime = startTime;
                velX = 0; velY = 0; posX = 0; posY = 0;
                recordedData = []; tbody.innerHTML = ''; 
                isRecording = true;
                startBtn.disabled = true; stopBtn.disabled = false; csvBtn.disabled = true;
            } catch (e) { alert('Error: ' + e); }
        });

        stopBtn.addEventListener('click', async () => {
            if (bleCharacteristic) {
                await bleCharacteristic.stopNotifications();
                bleCharacteristic.removeEventListener('characteristicvaluechanged', handleNotifications);
            }
            isRecording = false; startBtn.disabled = false; stopBtn.disabled = true; csvBtn.disabled = false;
        });

        csvBtn.addEventListener('click', () => {
            if (!recordedData.length) return;
            let csv = "Time(s),Roll(deg),Pitch(deg),Acc_X(G),Acc_Y(G),Vel_X(m/s),Vel_Y(m/s),Pos_X(m),Pos_Y(m)\n";
            recordedData.forEach(r => csv += r.join(",") + "\n");
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv" }));
            a.download = `Data_${Date.now()}.csv`;
            a.click();
        });

        function onDisconnected() {
            isRecording = false; startBtn.disabled = false; stopBtn.disabled = true; csvBtn.disabled = false;
        }

        function handleNotifications(event) {
            if (!isRecording) return;
            const [roll, pitch, ax, ay] = new TextDecoder().decode(event.target.value).split(',').map(Number);

            // 姿勢指示器（水平線の回転と上下）
            rollContainer.style.transform = `rotate(${-roll}deg)`;
            pitchContainer.style.transform = `translateY(${pitch * 1.5}px)`;

            // Gメーター（点の移動）
            gDot.style.left = `${Math.max(0, Math.min(100, (ax / MAX_G) * 50 + 50))}%`;
            gDot.style.top = `${Math.max(0, Math.min(100, (ay / MAX_G) * 50 + 50))}%`;

            // 物理演算
            const now = performance.now(), dt = (now - lastTime) / 1000;
            lastTime = now;
            velX += (ax * 9.80665) * dt; velY += (ay * 9.80665) * dt;
            posX += velX * dt; posY += velY * dt;

            // データ保存・描画
            const timeStr = ((now - startTime)/1000).toFixed(2);
            recordedData.push([timeStr, roll.toFixed(2), pitch.toFixed(2), ax.toFixed(3), ay.toFixed(3), velX.toFixed(3), velY.toFixed(3), posX.toFixed(3), posY.toFixed(3)]);
            
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${timeStr}</td><td>${roll.toFixed(1)}</td><td>${pitch.toFixed(1)}</td><td>${ax.toFixed(2)}</td><td>${ay.toFixed(2)}</td><td>${velX.toFixed(2)}</td><td>${velY.toFixed(2)}</td><td>${posX.toFixed(2)}</td><td>${posY.toFixed(2)}</td>`;
            tbody.insertBefore(tr, tbody.firstChild);
            if(tbody.children.length > 50) tbody.removeChild(tbody.lastChild);
        }
    </script>
</body>
</html>
